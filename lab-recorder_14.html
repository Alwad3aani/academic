<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>سجلّ التجارب المخبرية — الكلية التقنية بالعارضة</title>
<style>
  /* ============================================================
     تصميم أصلي — سجلّ التجارب المخبرية
     هوية لونية: أزرق بترولي (teal) + كهرماني، خلفية رملية فاتحة
     خط العناوين: Readex Pro — خط النص: Noto Kufi Arabic
     ============================================================ */
  @import url('https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;500;600;700&family=Noto+Kufi+Arabic:wght@300;400;500;600&display=swap');

  :root {
    --teal-900: #143028;
    --teal-700: #1f3d2e;
    --teal-500: #3d6b4a;
    --teal-300: #7ea087;
    --amber: #c9a857;
    --amber-soft: #f0dca0;
    --sand: #f5efe0;
    --sand-deep: #e6dcc2;
    --paper: #faf6ec;
    --ink: #1c241f;
    --ink-soft: #5a6359;
    --line: #d8cdaf;
    --danger: #a64228;
    --grid-line: #e0d5b8;
    --ok: #3d6b4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Noto Kufi Arabic', sans-serif;
    background:
      radial-gradient(circle at 12% 0%, #fbf6ec 0%, transparent 45%),
      radial-gradient(circle at 90% 10%, #eef3f2 0%, transparent 40%),
      var(--sand);
    color: var(--ink);
    line-height: 1.7;
    padding-bottom: 60px;
  }

  /* ---------- الترويسة ---------- */
  header {
    background: linear-gradient(110deg, var(--teal-900), var(--teal-700));
    color: #fff;
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      -45deg, transparent, transparent 16px,
      rgba(255,255,255,0.025) 16px, rgba(255,255,255,0.025) 32px);
    pointer-events: none;
  }
  .head-inner {
    max-width: 1080px;
    margin: 0 auto;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand .mark {
    width: 58px; height: 58px;
    border-radius: 13px;
    background: rgba(255,255,255,0.08);
    border: 1.5px dashed rgba(255,255,255,0.4);
    display: grid;
    place-items: center;
    text-align: center;
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-weight: 400;
    font-size: 9px;
    line-height: 1.4;
    color: var(--amber-soft);
    flex-shrink: 0;
    padding: 4px;
  }
  /* لإدراج الشعار الرسمي: ضع ملف الصورة داخل .mark كـ <img> بدل النص،
     أو اضبط الخصائص التالية ببساطة */
  .brand .mark img { width: 100%; height: 100%; object-fit: contain; }
  .brand h1 {
    font-family: 'Readex Pro', sans-serif;
    font-size: 21px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .brand p { font-size: 12.5px; color: var(--teal-300); font-weight: 300; }
  .head-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .head-actions button {
    font-family: 'Noto Kufi Arabic', sans-serif;
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .head-actions button:active { transform: translateY(1px); }
  .btn-amber { background: var(--amber); color: var(--teal-900); }
  .btn-amber:hover { box-shadow: 0 5px 14px rgba(224,146,47,0.45); }
  .btn-ghost { background: rgba(255,255,255,0.1); color: #fff; }
  .btn-ghost:hover { background: rgba(255,255,255,0.18); }
  .btn-link {
    background: transparent;
    color: var(--amber-soft);
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ---------- جسم الصفحة ---------- */
  main { max-width: 1080px; margin: 28px auto 0; padding: 0 28px; }

  .card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 26px 28px;
    margin-bottom: 26px;
    box-shadow: 0 2px 0 rgba(0,0,0,0.02), 0 14px 34px -22px rgba(12,59,58,0.3);
  }
  .card-title {
    font-family: 'Readex Pro', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--teal-900);
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .card-title .dot {
    width: 9px; height: 22px;
    border-radius: 4px;
    background: linear-gradient(var(--amber), var(--teal-500));
  }
  .card-sub {
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-bottom: 20px;
    padding-right: 19px;
  }

  /* ---------- الحقول ---------- */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px 18px;
  }
  @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }
  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--teal-700);
    margin-bottom: 6px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-size: 13.5px;
    color: var(--ink);
    background: var(--sand);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 10px 13px;
    transition: border-color .15s ease, background .15s ease;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--teal-500);
    background: #fff;
  }
  .field textarea { resize: vertical; min-height: 44px; }

  /* ---------- شريط أدوات التجارب ---------- */
  .exp-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .exp-bar h2 {
    font-family: 'Readex Pro', sans-serif;
    font-size: 20px;
    color: var(--teal-900);
    font-weight: 700;
  }
  .btn-add {
    font-family: 'Noto Kufi Arabic', sans-serif;
    background: var(--teal-700);
    color: #fff;
    border: none;
    border-radius: 11px;
    padding: 11px 20px;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: background .15s ease, transform .12s ease;
  }
  .btn-add:hover { background: var(--teal-900); }
  .btn-add:active { transform: translateY(1px); }

  /* ---------- بطاقة تجربة ---------- */
  .exp {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 18px;
    margin-bottom: 22px;
    overflow: hidden;
    box-shadow: 0 14px 34px -24px rgba(12,59,58,0.35);
  }
  .exp-head {
    background: linear-gradient(100deg, #f0ebe0, #f7f3ea);
    border-bottom: 1px solid var(--line);
    padding: 15px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .exp-head .tag {
    font-family: 'Readex Pro', sans-serif;
    font-weight: 700;
    color: var(--teal-900);
    font-size: 15.5px;
    display: flex; align-items: center; gap: 9px;
  }
  .exp-head .tag .num {
    background: var(--teal-700);
    color: #fff;
    width: 26px; height: 26px;
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 13px;
  }
  .exp-head-btns { display: flex; gap: 8px; }
  .mini-btn {
    font-family: 'Noto Kufi Arabic', sans-serif;
    border: 1.5px solid var(--line);
    background: #fff;
    color: var(--ink-soft);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: all .14s ease;
  }
  .mini-btn:hover { border-color: var(--teal-500); color: var(--teal-700); }
  .mini-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
  .exp-body { padding: 20px 22px 24px; }

  .exp-meta {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 18px;
  }
  @media (max-width: 680px) { .exp-meta { grid-template-columns: 1fr; } }

  /* اسم التجربة — حقل صغير */
  .exp-title-row { margin-bottom: 12px; }
  .exp-title-row input {
    width: 60%;
    max-width: 320px;
    min-width: 180px;
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--teal-900);
    background: var(--sand);
    border: 1.5px solid var(--line);
    border-radius: 9px;
    padding: 8px 12px;
  }
  .exp-title-row input:focus { outline: none; border-color: var(--teal-500); background: #fff; }
  @media (max-width: 600px) {
    .exp-title-row input { width: 100%; max-width: none; }
  }

  /* صف المحاور */
  .exp-axes {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: stretch;
    margin-bottom: 16px;
  }
  .axis-field {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--sand);
    border: 1.5px solid var(--line);
    border-radius: 9px;
    padding: 0 4px 0 10px;
    min-width: 0;
    flex: 1 1 140px;
  }
  .axis-field:focus-within {
    outline: none;
    border-color: var(--teal-500);
    background: #fff;
  }
  .axis-field input[type="text"],
  .axis-field input:not([type]) {
    border: none;
    background: transparent;
    flex: 1;
    min-width: 0;
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-size: 13px;
    color: var(--ink);
    padding: 8px 0;
  }
  .axis-field input:focus { outline: none; }
  .axis-field input[type="color"] {
    width: 26px; height: 26px;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 0;
    cursor: pointer;
    background: none;
    flex-shrink: 0;
  }
  .axis-field input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
  .axis-field input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }
  .axis-del {
    border: none;
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 14px;
    padding: 4px 6px;
    opacity: 0.55;
    flex-shrink: 0;
  }
  .axis-del:hover { opacity: 1; color: var(--danger); }
  .axis-add {
    font-family: 'Noto Kufi Arabic', sans-serif;
    border: 1.5px dashed var(--teal-300);
    background: #f3f6f0;
    color: var(--teal-700);
    border-radius: 9px;
    padding: 0 14px;
    font-size: 12.5px;
    cursor: pointer;
    flex: 0 0 auto;
    transition: background .14s ease;
  }
  .axis-add:hover { background: #e8f0e0; }
  .axis-add:disabled { opacity: 0.45; cursor: not-allowed; }

  /* وسيلة إيضاح المنحنيات */
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 1.5px solid #fff;
    box-shadow: 0 0 0 1px var(--line);
  }
  .exp-meta input {
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-size: 13px;
    background: var(--sand);
    border: 1.5px solid var(--line);
    border-radius: 9px;
    padding: 9px 12px;
  }
  .exp-meta input:focus { outline: none; border-color: var(--teal-500); background: #fff; }

  .toggles {
    display: flex; gap: 18px; flex-wrap: wrap;
    padding: 11px 15px;
    background: #f3f6f5;
    border: 1px solid #dce6e4;
    border-radius: 11px;
    margin-bottom: 18px;
  }
  .toggle {
    display: flex; align-items: center; gap: 7px;
    font-size: 12.5px; color: var(--teal-700); font-weight: 500;
    cursor: pointer;
  }
  .toggle input { width: 16px; height: 16px; accent-color: var(--teal-700); cursor: pointer; }

  /* ---------- الجدول ---------- */
  table { width: 100%; border-collapse: collapse; margin-bottom: 4px; }
  thead th {
    background: var(--teal-900);
    color: #fff;
    font-family: 'Readex Pro', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 11px;
    text-align: center;
  }
  thead th:first-child { border-top-right-radius: 10px; width: 56px; }
  thead th:last-child { border-top-left-radius: 10px; width: 56px; }
  tbody td {
    border: 1px solid var(--line);
    padding: 0;
    text-align: center;
    background: #fff;
  }
  tbody td.idx {
    background: var(--sand);
    color: var(--ink-soft);
    font-size: 12px;
    width: 56px;
  }
  tbody td input {
    width: 100%;
    border: none;
    background: transparent;
    text-align: center;
    font-family: 'Readex Pro', sans-serif;
    font-size: 13.5px;
    color: var(--ink);
    padding: 10px 6px;
  }
  tbody td input:focus {
    outline: 2px solid var(--teal-300);
    outline-offset: -2px;
    background: #fbfdfc;
  }
  tbody tr:hover td { background: #fcfaf4; }
  tbody tr:hover td.idx { background: #efe9da; }
  .row-del {
    border: none; background: transparent; cursor: pointer;
    color: var(--danger); font-size: 15px; padding: 6px 8px;
    opacity: .55; transition: opacity .14s ease;
  }
  .row-del:hover { opacity: 1; }
  .btn-row {
    width: 100%;
    font-family: 'Noto Kufi Arabic', sans-serif;
    border: 1.5px dashed var(--teal-300);
    background: #f3f6f5;
    color: var(--teal-700);
    border-radius: 10px;
    padding: 9px;
    font-size: 12.5px;
    cursor: pointer;
    margin-top: 8px;
    transition: background .14s ease;
  }
  .btn-row:hover { background: #e8f0ef; }

  /* ---------- الرسم البياني ---------- */
  .chart-wrap {
    margin-top: 20px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
  }
  .chart-title {
    text-align: center;
    font-family: 'Readex Pro', sans-serif;
    font-size: 14px;
    color: var(--teal-900);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .chart-host { position: relative; width: 100%; }
  canvas { display: block; width: 100%; }
  .chart-empty {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    color: var(--ink-soft);
    font-size: 13px;
    pointer-events: none;
  }

  footer {
    max-width: 1080px;
    margin: 12px auto 0;
    padding: 0 28px;
    color: var(--ink-soft);
    font-size: 12px;
    text-align: center;
  }

  /* ============================================================
     التجاوب — تابلت وجوال
     ============================================================ */

  /* تابلت — حتى 900px */
  @media (max-width: 900px) {
    main { padding: 0 18px; margin-top: 20px; }
    .head-inner { padding: 16px 18px; gap: 14px; }
    .brand h1 { font-size: 18px; }
    .brand p { font-size: 11.5px; }
    .card { padding: 22px 20px; border-radius: 14px; }
    .exp-meta { grid-template-columns: 1fr 1fr; }
    .exp-meta input:first-child { grid-column: 1 / -1; }
    footer { padding: 0 18px; }
  }

  /* جوال — حتى 600px */
  @media (max-width: 600px) {
    body { line-height: 1.6; }

    /* الترويسة عمودية على الجوال */
    .head-inner {
      flex-direction: column;
      align-items: stretch;
      padding: 14px 14px 16px;
      gap: 12px;
    }
    .brand { justify-content: center; text-align: center; }
    .brand h1 { font-size: 17px; }
    .brand p { font-size: 11px; }
    .head-actions {
      justify-content: center;
      width: 100%;
    }
    .head-actions button {
      flex: 1;
      justify-content: center;
      padding: 9px 10px;
      font-size: 12px;
    }

    main { padding: 0 12px; margin-top: 14px; }

    /* البطاقات بمسافات أصغر */
    .card {
      padding: 16px 14px;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .card-title { font-size: 16px; }
    .card-sub { font-size: 11.5px; margin-bottom: 14px; padding-right: 17px; }
    .grid { gap: 12px; }

    /* شريط التجارب */
    .exp-bar {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      margin-bottom: 12px;
    }
    .exp-bar h2 { font-size: 17px; }
    .btn-add { justify-content: center; padding: 10px 16px; }

    /* بطاقة التجربة */
    .exp { border-radius: 12px; margin-bottom: 14px; }
    .exp-head {
      padding: 12px 14px;
      flex-wrap: wrap;
    }
    .exp-head .tag { font-size: 14px; }
    .exp-head-btns { width: 100%; justify-content: flex-end; }
    .mini-btn { padding: 5px 10px; font-size: 11px; }
    .exp-body { padding: 14px 14px 16px; }
    .exp-meta {
      grid-template-columns: 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .exp-meta input { padding: 8px 11px; font-size: 12.5px; }

    /* الخيارات (شبكة/نقاط/خط) */
    .toggles { gap: 12px; padding: 9px 12px; }
    .toggle { font-size: 11.5px; }

    /* الجدول — أعمدة أضيق على الجوال */
    thead th { padding: 8px 4px; font-size: 11.5px; }
    thead th:first-child, thead th:last-child { width: 38px; }
    tbody td input {
      padding: 8px 4px;
      font-size: 13px;
    }
    tbody td.idx { font-size: 11px; width: 38px; }
    .row-del { font-size: 13px; padding: 4px 6px; }

    /* الحقول والمدخلات */
    .field input, .field select, .field textarea {
      padding: 9px 11px;
      font-size: 13px;
    }
    .field label { font-size: 11.5px; }

    /* الرسم البياني */
    .chart-wrap { padding: 12px; }
    .chart-title { font-size: 12.5px; }

    footer { padding: 0 14px; font-size: 11px; margin-top: 10px; }
  }

  /* جوال صغير جداً — حتى 380px */
  @media (max-width: 380px) {
    .head-actions { flex-direction: column; }
    .head-actions button { width: 100%; }
    .card { padding: 14px 12px; }
    .exp-body { padding: 12px 10px 14px; }
    thead th { font-size: 11px; padding: 7px 3px; }
    tbody td input { font-size: 12.5px; }
  }

  /* الأجهزة اللمسية: تكبير أهداف اللمس */
  @media (hover: none) and (pointer: coarse) {
    .mini-btn { min-height: 36px; }
    .row-del { min-width: 32px; min-height: 32px; font-size: 16px; }
    .toggle input { width: 18px; height: 18px; }
    .head-actions button { min-height: 42px; }
  }

  @media print {
    @page { size: A4; margin: 8mm; }
    header .head-actions, .exp-bar .btn-add, .exp-head-btns,
    .btn-row, .toggles, .row-del, footer { display: none !important; }
    thead th:last-child, tbody td:last-child { display: none !important; }

    html, body { height: auto; }
    body {
      background: #fff;
      padding-bottom: 0;
      font-size: 10px;
      line-height: 1.35;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* ترويسة مدمجة */
    header { break-inside: avoid; }
    .head-inner { padding: 8px 14px; }
    .brand .mark { width: 40px; height: 40px; }
    .brand h1 { font-size: 15px; }
    .brand p { font-size: 9px; }

    /* بطاقات مضغوطة */
    main { margin: 8px auto 0; padding: 0 14px; }
    .card, .exp {
      box-shadow: none;
      break-inside: avoid;
      border-radius: 9px;
      margin-bottom: 10px;
    }
    .card { padding: 10px 14px; }
    .card-title { font-size: 13px; margin-bottom: 2px; }
    .card-sub { font-size: 9px; margin-bottom: 8px; }
    .grid { gap: 6px 12px; }
    .field label { font-size: 9px; margin-bottom: 2px; }
    .field input, .field select, .field textarea {
      padding: 4px 7px;
      font-size: 9.5px;
      border-width: 1px;
      border-radius: 6px;
    }
    .field textarea { min-height: 28px; }

    .exp-bar { margin-bottom: 6px; }
    .exp-bar h2 { font-size: 14px; }

    .exp-head { padding: 6px 12px; }
    .exp-head .tag { font-size: 11px; }
    .exp-head .tag .num { width: 18px; height: 18px; font-size: 10px; }
    .exp-body { padding: 8px 12px 10px; }
    .exp-meta { gap: 6px; margin-bottom: 8px; }
    .exp-meta input { padding: 3px 7px; font-size: 9px; }

    thead th { padding: 4px; font-size: 9.5px; }
    tbody td input { padding: 3px 4px; font-size: 9.5px; }
    tbody td.idx { font-size: 8.5px; }

    .chart-wrap { margin-top: 8px; padding: 8px; break-inside: avoid; }
    .chart-title { font-size: 11px; margin-bottom: 4px; }
  }
</style>
</head>
<body>

        <h1>الكلية التقنية بالعارضة</h1>

    </div>

  <!-- التجارب -->

<script>
/* ============================================================
   المنطق — كل شيء محلي، لا اتصال بأي خادم
   ============================================================ */
const PALETTE = ['#3d6b4a', '#c9a857', '#1f3d2e', '#a64228', '#5d7d9c', '#8b6b3d'];
// مفاتيح المحاور بالترتيب: y, z, w, v, u, t (حتى 6 محاور)
const AXIS_KEYS = ['y', 'z', 'w', 'v', 'u', 't'];
const AXIS_LETTERS = ['Y', 'Z', 'W', 'V', 'U', 'T'];
let experiments = [];
let seq = 0;

const expHost = document.getElementById('experiments');

function makeExperiment(preset) {
  seq++;
  // البنية الجديدة:
  //   xLabel: عنوان المحور الأفقي
  //   yAxes: مصفوفة من محاور القيم {key, label, color}
  //         key مثل 'y', 'z', 'w'... ويُستخدم في rows[i][key]
  //   rows: كل صف عبارة عن كائن {x, y, z, w, ...}
  const exp = {
    id: 'exp' + seq,
    title: preset?.title || ('التجربة ' + seq),
    xLabel: preset?.xLabel || '',
    yAxes: preset?.yAxes
      ? preset.yAxes.map((a, i) => ({ key: AXIS_KEYS[i], label: a.label || '', color: a.color || PALETTE[i % PALETTE.length] }))
      : [{ key: 'y', label: preset?.yLabel || '', color: PALETTE[(seq - 1) % PALETTE.length] }],
    showGrid: true,
    showPoints: true,
    showLine: true,
    rows: preset?.rows
      ? preset.rows.map(r => {
          const o = { x: r[0] };
          for (let i = 1; i < r.length; i++) o[AXIS_KEYS[i - 1]] = r[i];
          return o;
        })
      : Array.from({ length: 5 }, () => ({ x: '', y: '' }))
  };
  experiments.push(exp);
  return exp;
}

// مفاتيح المحاور بالترتيب: y, z, w, v, u, t (حتى 6 محاور)
// تم التعريف أعلى الملف

function render() {
  expHost.innerHTML = '';
  experiments.forEach((exp, ei) => {
    const card = document.createElement('div');
    card.className = 'exp';

    // بناء حقول عناوين المحاور — حقل X صغير + حقل لكل محور قيم
    const axisFieldsHtml = `
      <div class="axis-field axis-x">
        <input data-f="xLabel" value="${escapeAttr(exp.xLabel)}" placeholder="محور X">
        <input type="color" data-x-color value="${exp.xColor || '#1f3d2e'}" title="لون محور X">
      </div>
      ${exp.yAxes.map((ax, ai) => `
        <div class="axis-field">
          <input data-axis-label="${ai}" value="${escapeAttr(ax.label)}" placeholder="محور ${AXIS_LETTERS[ai]}">
          <input type="color" data-axis-color="${ai}" value="${ax.color}" title="لون المنحنى">
          ${exp.yAxes.length > 1 ? `<button class="axis-del" data-axis-del="${ai}" title="حذف هذا المحور">✕</button>` : ''}
        </div>
      `).join('')}
      <button class="axis-add" data-act="addaxis" ${exp.yAxes.length >= AXIS_KEYS.length ? 'disabled' : ''}>＋ محور جديد</button>
    `;

    // بناء رأس الجدول — # + X + كل محاور Y + حذف
    const tableHead = `
      <th>#</th>
      <th>${escapeHtml(exp.xLabel || 'X')}</th>
      ${exp.yAxes.map((ax, ai) => `<th>${escapeHtml(ax.label || AXIS_LETTERS[ai])}</th>`).join('')}
      <th>حذف</th>
    `;

    card.innerHTML = `
      <div class="exp-head">
        <div class="tag"><span class="num">${ei + 1}</span> <span>${escapeHtml(exp.title || 'تجربة')}</span></div>
        <div class="exp-head-btns">
          <button class="mini-btn" data-act="clear">⌫ تفريغ القيم</button>
          <button class="mini-btn danger" data-act="remove">🗑 حذف التجربة</button>
        </div>
      </div>
      <div class="exp-body">
        <div class="exp-title-row">
          <input data-f="title" value="${escapeAttr(exp.title)}" placeholder="اسم التجربة">
        </div>
        <div class="exp-axes">${axisFieldsHtml}</div>
        <div class="toggles">
          <label class="toggle"><input type="checkbox" data-t="showGrid" ${exp.showGrid ? 'checked' : ''}> إظهار الشبكة</label>
          <label class="toggle"><input type="checkbox" data-t="showPoints" ${exp.showPoints ? 'checked' : ''}> إظهار النقاط</label>
          <label class="toggle"><input type="checkbox" data-t="showLine" ${exp.showLine ? 'checked' : ''}> وصل النقاط بخط</label>
        </div>
        <table>
          <thead><tr>${tableHead}</tr></thead>
          <tbody></tbody>
        </table>
        <button class="btn-row" data-act="addrow">＋ إضافة صف</button>
        <div class="chart-wrap">
          <div class="chart-title">${escapeHtml(exp.title || 'الرسم البياني')}</div>
          ${exp.yAxes.length > 1 ? `
            <div class="legend">
              ${exp.yAxes.map((ax, ai) => `
                <span class="legend-item"><span class="legend-dot" style="background:${ax.color}"></span>${escapeHtml(ax.label || AXIS_LETTERS[ai])}</span>
              `).join('')}
            </div>
          ` : ''}
          <div class="chart-host">
            <canvas></canvas>
            <div class="chart-empty"></div>
          </div>
        </div>
      </div>`;
    expHost.appendChild(card);

    // ---- ربط الأحداث ----
    card.querySelector('[data-act="remove"]').onclick = () => {
      if (experiments.length === 1) { alert('لا يمكن حذف آخر تجربة.'); return; }
      experiments.splice(ei, 1); render();
    };
    card.querySelector('[data-act="clear"]').onclick = () => {
      exp.rows = exp.rows.map(() => {
        const o = { x: '' };
        exp.yAxes.forEach(a => o[a.key] = '');
        return o;
      });
      render();
    };
    card.querySelector('[data-act="addrow"]').onclick = () => {
      const o = { x: '' };
      exp.yAxes.forEach(a => o[a.key] = '');
      exp.rows.push(o);
      render();
    };
    card.querySelector('[data-act="addaxis"]').onclick = () => {
      if (exp.yAxes.length >= AXIS_KEYS.length) return;
      const i = exp.yAxes.length;
      exp.yAxes.push({ key: AXIS_KEYS[i], label: '', color: PALETTE[i % PALETTE.length] });
      // تهيئة القيمة في كل الصفوف الموجودة
      exp.rows.forEach(r => { if (!(AXIS_KEYS[i] in r)) r[AXIS_KEYS[i]] = ''; });
      render();
    };

    // عنوان التجربة
    card.querySelector('[data-f="title"]').oninput = (e) => {
      exp.title = e.target.value;
      card.querySelector('.tag span:last-child').textContent = e.target.value || 'تجربة';
      card.querySelector('.chart-title').textContent = e.target.value || 'الرسم البياني';
    };
    // عنوان محور X
    card.querySelector('[data-f="xLabel"]').oninput = (e) => {
      exp.xLabel = e.target.value;
      card.querySelectorAll('thead th')[1].textContent = e.target.value || 'X';
      drawChart(exp, card);
    };
    // لون محور X
    card.querySelector('[data-x-color]').oninput = (e) => {
      exp.xColor = e.target.value;
      drawChart(exp, card);
    };
    // عناوين محاور القيم
    card.querySelectorAll('[data-axis-label]').forEach(inp => {
      inp.oninput = () => {
        const ai = +inp.dataset.axisLabel;
        exp.yAxes[ai].label = inp.value;
        card.querySelectorAll('thead th')[2 + ai].textContent = inp.value || AXIS_LETTERS[ai];
        // تحديث وسيلة الإيضاح إن وُجدت
        const legendItems = card.querySelectorAll('.legend-item');
        if (legendItems[ai]) legendItems[ai].lastChild.textContent = inp.value || AXIS_LETTERS[ai];
        drawChart(exp, card);
      };
    });
    // ألوان المحاور
    card.querySelectorAll('[data-axis-color]').forEach(inp => {
      inp.oninput = () => {
        const ai = +inp.dataset.axisColor;
        exp.yAxes[ai].color = inp.value;
        const legendDots = card.querySelectorAll('.legend-dot');
        if (legendDots[ai]) legendDots[ai].style.background = inp.value;
        drawChart(exp, card);
      };
    });
    // حذف محور
    card.querySelectorAll('[data-axis-del]').forEach(btn => {
      btn.onclick = () => {
        const ai = +btn.dataset.axisDel;
        const removedKey = exp.yAxes[ai].key;
        exp.yAxes.splice(ai, 1);
        exp.rows.forEach(r => delete r[removedKey]);
        // إعادة ترتيب المفاتيح لتبقى متسلسلة y, z, w...
        const remap = {};
        exp.yAxes.forEach((a, i) => {
          const newKey = AXIS_KEYS[i];
          if (a.key !== newKey) {
            exp.rows.forEach(r => { r[newKey] = r[a.key]; delete r[a.key]; });
            a.key = newKey;
          }
        });
        render();
      };
    });
    // الخيارات (شبكة/نقاط/خط)
    card.querySelectorAll('[data-t]').forEach(chk => {
      chk.onchange = () => { exp[chk.dataset.t] = chk.checked; drawChart(exp, card); };
    });

    // ---- صفوف الجدول ----
    const tbody = card.querySelector('tbody');
    exp.rows.forEach((row, ri) => {
      const tr = document.createElement('tr');
      const cells = [`<td class="idx">${ri + 1}</td>`];
      cells.push(`<td><input inputmode="decimal" value="${escapeAttr(row.x ?? '')}" data-c="x"></td>`);
      exp.yAxes.forEach(ax => {
        cells.push(`<td><input inputmode="decimal" value="${escapeAttr(row[ax.key] ?? '')}" data-c="${ax.key}"></td>`);
      });
      cells.push(`<td><button class="row-del" title="حذف الصف">✕</button></td>`);
      tr.innerHTML = cells.join('');
      tbody.appendChild(tr);
      tr.querySelectorAll('input').forEach(inp => {
        inp.oninput = () => { row[inp.dataset.c] = inp.value; drawChart(exp, card); };
      });
      tr.querySelector('.row-del').onclick = () => {
        exp.rows.splice(ri, 1);
        if (!exp.rows.length) {
          const o = { x: '' };
          exp.yAxes.forEach(a => o[a.key] = '');
          exp.rows.push(o);
        }
        render();
      };
    });

    // ---- تنقل بالأسهم داخل الجدول ----
    setupTableNav(card, exp);

    drawChart(exp, card);
  });
}

// تنقل لوحة المفاتيح داخل خلايا الجدول (الأسهم + Enter)
function setupTableNav(card, exp) {
  const tbody = card.querySelector('tbody');
  if (!tbody) return;
  // مصفوفة ثنائية: rows[r][c] = input
  const getGrid = () => {
    return Array.from(tbody.querySelectorAll('tr')).map(tr =>
      Array.from(tr.querySelectorAll('input'))
    );
  };

  tbody.addEventListener('keydown', (e) => {
    const target = e.target;
    if (target.tagName !== 'INPUT') return;
    const tr = target.closest('tr');
    if (!tr) return;

    const grid = getGrid();
    const r = Array.from(tbody.children).indexOf(tr);
    const c = grid[r].indexOf(target);
    if (r < 0 || c < 0) return;

    // ملاحظة RTL: في الواجهة العربية، السهم اليمين بصرياً يقابل ArrowLeft في DOM
    // والسهم اليسار بصرياً يقابل ArrowRight. نتعامل مع التنقل بناءً على ترتيب الأعمدة الفعلي.
    let nr = r, nc = c;
    if (e.key === 'ArrowDown') nr = r + 1;
    else if (e.key === 'ArrowUp') nr = r - 1;
    else if (e.key === 'ArrowLeft') nc = c + 1;   // التالي بصرياً (X → Y → Z في RTL)
    else if (e.key === 'ArrowRight') nc = c - 1;  // السابق بصرياً
    else if (e.key === 'Enter') {
      // Enter: انتقل للصف التالي في نفس العمود؛ إذا كان آخر صف، أضف صفاً جديداً
      e.preventDefault();
      if (r === grid.length - 1) {
        const o = { x: '' };
        exp.yAxes.forEach(a => o[a.key] = '');
        exp.rows.push(o);
        render();
        // التركيز على نفس العمود في الصف الجديد
        setTimeout(() => {
          const newGrid = Array.from(tbody.querySelectorAll('tr')).map(tr =>
            Array.from(tr.querySelectorAll('input')));
          const nextInput = newGrid[r + 1]?.[c];
          if (nextInput) { nextInput.focus(); nextInput.select(); }
        }, 0);
        return;
      }
      nr = r + 1;
    }
    else return;

    // فحص الحدود
    if (nr < 0 || nr >= grid.length) return;
    if (nc < 0 || nc >= grid[nr].length) return;

    e.preventDefault();
    const next = grid[nr][nc];
    if (next) { next.focus(); next.select(); }
  });
}

/* ---------- رسم المنحنى على canvas ---------- */
let printMode = false;
function drawChart(exp, card) {
  const canvas = card.querySelector('canvas');
  const host = card.querySelector('.chart-host');
  const empty = card.querySelector('.chart-empty');
  const ctx = canvas.getContext('2d');

  const cssW = host.clientWidth || 600;
  // ارتفاع متجاوب: أصغر على الجوال، متوسط على التابلت، كامل على الكمبيوتر
  let cssH;
  if (printMode) cssH = 190;
  else if (cssW < 360) cssH = 240;
  else if (cssW < 560) cssH = 280;
  else cssH = 340;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  canvas.style.height = cssH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cssW, cssH);

  // جمع نقاط كل محور قيم على حدة
  const series = exp.yAxes.map(ax => ({
    color: ax.color,
    label: ax.label || ax.key.toUpperCase(),
    pts: exp.rows
      .map(r => [parseFloat(r.x), parseFloat(r[ax.key])])
      .filter(p => isFinite(p[0]) && isFinite(p[1]))
      .sort((a, b) => a[0] - b[0])
  }));

  const hasData = series.some(s => s.pts.length >= 2);
  if (!hasData) {
    empty.textContent = 'أدخل نقطتين على الأقل لرسم المنحنى';
    return;
  }
  empty.textContent = '';

  // هوامش متجاوبة — أصغر على الشاشات الضيقة
  const isNarrow = cssW < 480;
  const padL = isNarrow ? 48 : 64;
  const padR = isNarrow ? 12 : 18;
  const padT = isNarrow ? 14 : 16;
  const padB = isNarrow ? 36 : 42;
  const plotW = cssW - padL - padR;
  const plotH = cssH - padT - padB;

  // الحدود تشمل كل المحاور معاً
  const allX = [], allY = [];
  series.forEach(s => s.pts.forEach(p => { allX.push(p[0]); allY.push(p[1]); }));
  let xmin = Math.min(...allX), xmax = Math.max(...allX);
  let ymin = Math.min(...allY), ymax = Math.max(...allY);
  if (xmin === xmax) { xmin -= 1; xmax += 1; }
  if (ymin === ymax) { ymin -= 1; ymax += 1; }
  const xpad = (xmax - xmin) * 0.08, ypad = (ymax - ymin) * 0.12;
  xmin -= xpad; xmax += xpad; ymin -= ypad; ymax += ypad;

  // تدريج بقيم حلوة — يفضّل الأعداد الصحيحة
  const xTicks = niceTicks(xmin, xmax, 6);
  const yTicks = niceTicks(ymin, ymax, 6);
  // تمديد حدود العرض لتلامس بداية ونهاية التدريج
  xmin = Math.min(xmin, xTicks[0]); xmax = Math.max(xmax, xTicks[xTicks.length - 1]);
  ymin = Math.min(ymin, yTicks[0]); ymax = Math.max(ymax, yTicks[yTicks.length - 1]);

  const X = x => padL + (x - xmin) / (xmax - xmin) * plotW;
  const Y = y => padT + plotH - (y - ymin) / (ymax - ymin) * plotH;

  // إطار
  ctx.fillStyle = '#fff';
  ctx.fillRect(padL, padT, plotW, plotH);

  // شبكة + تدريج
  ctx.font = (isNarrow ? "10px" : "11px") + " 'Readex Pro', sans-serif";
  const xColor = exp.xColor || '#1f3d2e';
  // محور X
  xTicks.forEach(v => {
    const gx = X(v);
    if (exp.showGrid) {
      ctx.strokeStyle = '#e0d5b8'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(gx, padT); ctx.lineTo(gx, padT + plotH); ctx.stroke();
    }
    ctx.fillStyle = xColor;
    ctx.textAlign = 'center';
    ctx.fillText(fmtTick(v), gx, padT + plotH + 16);
  });
  // محور Y
  ctx.fillStyle = '#5c6b68';
  yTicks.forEach(v => {
    const gy = Y(v);
    if (exp.showGrid) {
      ctx.strokeStyle = '#e0d5b8'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(padL, gy); ctx.lineTo(padL + plotW, gy); ctx.stroke();
    }
    ctx.textAlign = 'right';
    ctx.fillText(fmtTick(v), padL - 6, gy + 4);
  });

  // إطار المحاور
  ctx.strokeStyle = '#143028';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(padL, padT, plotW, plotH);

  // عنوان محور X
  ctx.font = "600 " + (isNarrow ? "11px" : "12px") + " 'Readex Pro', sans-serif";
  ctx.fillStyle = xColor;
  ctx.textAlign = 'center';
  ctx.fillText(exp.xLabel || 'محور X', padL + plotW / 2, cssH - 8);
  // عنوان محاور القيم — إن كان محور واحد فقط نكتب اسمه، وإلا "محاور القيم"
  ctx.fillStyle = '#1f3d2e';
  ctx.save();
  ctx.translate(isNarrow ? 9 : 11, padT + plotH / 2);
  ctx.rotate(-Math.PI / 2);
  const yTitle = exp.yAxes.length === 1
    ? (exp.yAxes[0].label || 'محور Y')
    : 'القيم';
  ctx.fillText(yTitle, 0, 0);
  ctx.restore();

  // ارسم كل سلسلة (محور قيم) بلونها
  series.forEach(s => {
    if (s.pts.length < 2 && !exp.showPoints) return;
    if (s.pts.length === 0) return;

    // خط الوصل
    if (exp.showLine && s.pts.length >= 2) {
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 2.4;
      ctx.lineJoin = 'round';
      ctx.beginPath();
      s.pts.forEach((p, i) => {
        const px = X(p[0]), py = Y(p[1]);
        i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
      });
      ctx.stroke();
    }

    // النقاط
    if (exp.showPoints) {
      s.pts.forEach(p => {
        const px = X(p[0]), py = Y(p[1]);
        ctx.beginPath();
        ctx.arc(px, py, 4.5, 0, Math.PI * 2);
        ctx.fillStyle = s.color;
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#fff';
        ctx.stroke();
      });
    }
  });
}

/* ---------- أدوات مساعدة ---------- */
// يولّد قائمة من القيم "الحلوة" بين min و max — يفضّل الأعداد الصحيحة
function niceTicks(min, max, target) {
  const range = max - min;
  if (range <= 0 || !isFinite(range)) return [min, max];
  const rawStep = range / target;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const norm = rawStep / mag;
  // الخطوات المسموح بها: 1, 2, 2.5, 5, 10 × 10^n
  let niceStep;
  if (norm < 1.5) niceStep = 1;
  else if (norm < 2.2) niceStep = 2;
  else if (norm < 3.5) niceStep = 2.5;
  else if (norm < 7.5) niceStep = 5;
  else niceStep = 10;
  niceStep *= mag;
  const start = Math.floor(min / niceStep) * niceStep;
  const end = Math.ceil(max / niceStep) * niceStep;
  const out = [];
  // تجنب الانحراف العشري التراكمي
  const decimals = Math.max(0, -Math.floor(Math.log10(niceStep)));
  for (let v = start; v <= end + niceStep * 0.5; v += niceStep) {
    out.push(parseFloat(v.toFixed(decimals + 2)));
  }
  return out;
}
// تنسيق قيمة التدريج: يحذف الأصفار الزائدة ويظهر الأعداد الصحيحة بدون فاصلة
function fmtTick(n) {
  if (Math.abs(n) < 1e-10) return '0';
  if (Math.abs(n) >= 10000 || (Math.abs(n) < 0.001 && n !== 0)) return n.toExponential(1);
  // يقرّب لـ 4 منازل عشرية ويحذف الأصفار الزائدة
  return parseFloat(n.toFixed(4)).toString();
}
function trim(n) {
  if (Math.abs(n) >= 1000 || (Math.abs(n) < 0.01 && n !== 0)) return n.toExponential(1);
  return (Math.round(n * 100) / 100).toString();
}
function escapeHtml(s) {
  return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
}
function escapeAttr(s) {
  return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}
